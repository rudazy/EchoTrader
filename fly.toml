app = "echotrader"
primary_region = "lhr"

[build]
  builder = "paketobuildpacks/builder:base"

[processes]
  app = "python -m api.server"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["http"]
    force_https = true